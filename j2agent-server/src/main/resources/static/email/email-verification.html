<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{headTitle}}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0"
       style="background-color:#f4f6f8;padding:32px 16px;">
    <tr>
        <td align="center">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
                   style="max-width:480px;background-color:#ffffff;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.08);overflow:hidden;">
                <tr>
                    <td style="background-color:#5182e4;padding:24px 32px;text-align:center;">
                        <h1 style="margin:0;font-size:20px;font-weight:600;color:#ffffff;letter-spacing:0.5px;">
                            J2Agent AI
                        </h1>
                        <p style="margin:8px 0 0;font-size:13px;color:#ffffff;">{{headerSubtitle}}</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px 32px 16px;text-align:center;">
                        <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#606266;">{{bodyMessage}}</p>
                        <table role="presentation" cellspacing="0" cellpadding="0" align="center"
                               style="margin:0 auto;">
                            <tr>
                                <td style="border:2px solid #5182e4;border-radius:10px;background-color:#f3fbff;padding:20px 36px;text-align:center;">
                                    <span style="display:inline-block;font-size:32px;font-weight:700;letter-spacing:8px;color:#5182e4;font-family:Arial,Helvetica,'Helvetica Neue',sans-serif;">{{code}}</span>
                                </td>
                            </tr>
                        </table>
                        <p style="margin:24px 0 0;font-size:13px;line-height:1.6;color:#909399;">验证码 <strong
                                style="color:#606266;">10 分钟</strong> 内有效，请勿向他人泄露。</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:16px 32px 28px;border-top:1px solid #ebeef5;text-align:center;">
                        <p style="margin:0;font-size:12px;color:#c0c4cc;">如非本人操作，请忽略此邮件。</p>
                        <p style="margin:0;font-size:12px;color:#c0c4cc;">本邮件为系统邮件，请勿回复。</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
