          description: 最近一次探测时间（毫秒）
        probeError:
          type: string
          description: 探测失败时的错误信息
        fullRebuildRunning:
          type: boolean
          description: 知识库 exclusive 完全重建是否进行中
        embeddingBatchSize:
          type: integer
          description: 当前生效的 Embedding API 批量大小（默认 10）

