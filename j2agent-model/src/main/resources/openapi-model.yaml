    ProviderConfigDto:
      type: object
      description: 模型提供商配置（LLM/Embedding），apiKey 已脱敏
      properties:
        id:
          type: string
          description: 主键（UUIDv7）
        apiType:
          type: string
          description: API 类型
          enum: [ llm, embedding ]
        configName:
          type: string
          description: 配置名称
        providerType:
          type: string
          description: 提供商类型
        config:
          type: object
          description: 提供商差异化字段；不同 providerType 字段集合不同
          additionalProperties: true
        enabled:
          type: boolean
          description: 是否启用
        isCurrent:
          type: boolean
          description: 是否当前生效
        description:
          type: string
          description: 描述
        createTime:
          type: integer
          format: int64
          description: 创建时间（毫秒）
        updateTime:
          type: integer
          format: int64
          description: 更新时间（毫秒）

    ProviderConfigUpsertDto:
      type: object
      description: 新增/更新模型提供商配置入参
      required:
        - configName
        - providerType
      properties:
        apiType:
          type: string
          description: API 类型（仅新增时必填；更新时忽略）
          enum: [ llm, embedding ]
        configName:
          type: string
          description: 配置名称（展示用，可重复）
        providerType:
          type: string
          description: 提供商类型
        config:
          type: object
          description: 提供商差异化字段；apiKey 留空表示沿用原值
          additionalProperties: true
        description:
          type: string
          description: 描述
        enabled:
          type: boolean
          description: 是否启用，默认 true
          default: true
        makeCurrent:
          type: boolean
          description: 新增时是否立即设为当前生效
          default: false

    EmbeddingRuntimeStatusDto:
