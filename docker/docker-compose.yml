x-middleware-images:
  postgres: &postgres_image docker.io/postgres:18.4
  redis: &redis_image redis:7.4.2
  etcd: &etcd_image quay.io/coreos/etcd:v3.5.25
  rustfs: &rustfs_image rustfs/rustfs:1.0.0-beta.10
  milvus: &milvus_image milvusdb/milvus:v2.6.18

services:
  postgres:
    image: *postgres_image
    platform: linux/amd64
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # PG 18+ 要求挂载到 /var/lib/postgresql（非 /data），数据落在版本子目录如 18/docker
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}postgres:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
  redis:
    image: *redis_image
    platform: linux/amd64
    command: [ "redis-server", "--appendonly", "yes", "--port", "6379" ]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}redis${DIR_PATH_SEPARATOR}data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "ping" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 10s
    restart: unless-stopped
  etcd:
    image: *etcd_image
    platform: linux/amd64
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - -advertise-client-urls=http://etcd:2379
      - -listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}etcd:/etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
  rustfs:
    image: *rustfs_image
    platform: linux/amd64
    user: root
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        mkdir -p /data /logs
        chown -R 10001:10001 /data /logs
        exec /usr/bin/rustfs /data
    environment:
      RUSTFS_ACCESS_KEY: "${RUSTFS_ACCESS_KEY}"
      RUSTFS_SECRET_KEY: "${RUSTFS_SECRET_KEY}"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_OBS_LOG_DIRECTORY: /logs
    ports:
      # 宿主机默认端口取 RustFS 默认容器端口前缀加 1：9000->19000，9001->19001
      - "${RUSTFS_API_PORT}:9000"
      - "${RUSTFS_CONSOLE_PORT}:9001"
    volumes:
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}rustfs${DIR_PATH_SEPARATOR}data:/data
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}rustfs${DIR_PATH_SEPARATOR}logs:/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:9000/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
  milvus:
    image: *milvus_image
    platform: linux/amd64
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        mkdir -p /milvus/external_configs
        if [ -d /milvus/external_configs/user.yaml ]; then
          rm -rf /milvus/external_configs/user.yaml
        fi
        if [ ! -f /milvus/external_configs/user.yaml ]; then
          printf "%s\n" "# Extra config to override default milvus.yaml" > /milvus/external_configs/user.yaml
        fi
        cp /milvus/external_configs/user.yaml /milvus/configs/user.yaml
        exec milvus run standalone
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_USE_EMBED: "false"
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: rustfs:9000
      MINIO_ACCESS_KEY_ID: "${RUSTFS_ACCESS_KEY}"
      MINIO_SECRET_ACCESS_KEY: "${RUSTFS_SECRET_KEY}"
      MINIO_BUCKET_NAME: milvus-bucket
      MQ_TYPE: woodpecker
    ports:
      - "${MILVUS_PORT}:19530"
      - "${MILVUS_HEALTH_PORT}:9091"
    volumes:
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}milvus${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}milvus:/var/lib/milvus
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}milvus:/milvus/external_configs
    depends_on:
      etcd:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    restart: unless-stopped
  j2agent:
    image: j2agent:${TAG}
    platform: linux/amd64
    pull_policy: build
    build:
      context: ..
      dockerfile: docker/j2agent/Dockerfile
    ports:
      - "${J2AGENT_PORT}:${J2AGENT_PORT}"
      - "${J2AGENT_HTTP_REDIRECT_PORT:-${J2AGENT_PORT}}:${J2AGENT_HTTP_REDIRECT_PORT:-${J2AGENT_PORT}}"
    environment:
      JWT_SECRET: "${JWT_SECRET}"
      JAVA_OPTS: "${JAVA_OPTS}"
      SPRING_OPTIONS: "${SPRING_OPTIONS} --server.ssl.enabled=${J2AGENT_HTTPS_ENABLED:-false} --server.ssl.certificate=/opt/j2agent/volume/certs/${J2AGENT_HTTPS_CERT_FILE:-j2agent.crt} --server.ssl.certificate-private-key=/opt/j2agent/volume/certs/${J2AGENT_HTTPS_KEY_FILE:-j2agent.key}"
      J2AGENT_PORT: "${J2AGENT_PORT}"
      J2AGENT_HTTP_REDIRECT_PORT: "${J2AGENT_HTTP_REDIRECT_PORT}"
      J2AGENT_DB_HOST: "${J2AGENT_DB_HOST}"
      J2AGENT_DB_PORT: "${J2AGENT_DB_PORT}"
      J2AGENT_DB_USERNAME: "${J2AGENT_DB_USERNAME}"
      J2AGENT_DB_PASSWORD: "${J2AGENT_DB_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
      J2AGENT_REDIS_HOST: "${J2AGENT_REDIS_HOST}"
      J2AGENT_REDIS_PORT: "${J2AGENT_REDIS_PORT}"
      J2AGENT_REDIS_PASSWORD: "${J2AGENT_REDIS_PASSWORD}"
      J2AGENT_MILVUS_HOST: "${J2AGENT_MILVUS_HOST}"
      J2AGENT_MILVUS_PORT: "${J2AGENT_MILVUS_PORT}"
      J2AGENT_MILVUS_TOKEN: "${J2AGENT_MILVUS_TOKEN}"
      J2AGENT_MILVUS_SCHEMA_CONFIG_PATH: "${J2AGENT_MILVUS_SCHEMA_CONFIG_PATH}"
      J2AGENT_STORAGE_ENABLED: "${J2AGENT_STORAGE_ENABLED}"
      J2AGENT_STORAGE_TYPE: "${J2AGENT_STORAGE_TYPE}"
      J2AGENT_STORAGE_BUCKET: "${J2AGENT_STORAGE_BUCKET}"
      J2AGENT_S3_ENDPOINT: "${J2AGENT_S3_ENDPOINT}"
      J2AGENT_S3_ACCESS_KEY_ID: "${J2AGENT_S3_ACCESS_KEY_ID}"
      J2AGENT_S3_SECRET_ACCESS_KEY: "${J2AGENT_S3_SECRET_ACCESS_KEY}"
      J2AGENT_STORAGE_ACCESS_MODE: "${J2AGENT_STORAGE_ACCESS_MODE:-proxy}"
      J2AGENT_STORAGE_SYNC_RETENTION_DAYS: "${J2AGENT_STORAGE_SYNC_RETENTION_DAYS}"
      J2AGENT_STORAGE_SYNC_CLEANUP_CRON: "${J2AGENT_STORAGE_SYNC_CLEANUP_CRON}"
      ALIYUN_OSS_ENDPOINT: "${ALIYUN_OSS_ENDPOINT}"
      ALIYUN_OSS_ACCESS_KEY_ID: "${ALIYUN_OSS_ACCESS_KEY_ID}"
      ALIYUN_OSS_ACCESS_KEY_SECRET: "${ALIYUN_OSS_ACCESS_KEY_SECRET}"
      QINIU_ACCESS_KEY: "${QINIU_ACCESS_KEY}"
      QINIU_SECRET_KEY: "${QINIU_SECRET_KEY}"
      QINIU_DOMAIN: "${QINIU_DOMAIN}"
      QINIU_USE_HTTPS: "${QINIU_USE_HTTPS}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}j2agent:/opt/j2agent/volume
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}j2agent${DIR_PATH_SEPARATOR}knowledge-repo:/opt/j2agent/volume/knowledge-repo
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}j2agent${DIR_PATH_SEPARATOR}certs:/opt/j2agent/volume/certs
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}j2agent${DIR_PATH_SEPARATOR}plugins${DIR_PATH_SEPARATOR}agents:/opt/j2agent/volume/plugins/agents
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}j2agent${DIR_PATH_SEPARATOR}plugins${DIR_PATH_SEPARATOR}skills:/opt/j2agent/volume/plugins/skills
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    restart: unless-stopped
networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.19.11.0/24
          gateway: 10.19.11.1
