server:
  port: ${J2AGENT_PORT}
  servlet:
    encoding:
      charset: UTF-8 # 需要强制设置编码，否则SSE会出现乱码
      force: true
spring:
  application:
    name: j2agent
  servlet:
    multipart:
      enabled: true
      max-file-size: 10GB # 文件最大上传大小
      max-request-size: 10GB # 请求最大上传大小
  web:
    resources:
      # 生产前端由宿主机卷挂载；末尾 / 符合 Spring 6.2+ 资源路径约定
      static-locations: file:/opt/j2agent/volume/ui/
  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:postgresql://${J2AGENT_DB_HOST}:${J2AGENT_DB_PORT}/${POSTGRES_DB}
    username: ${J2AGENT_DB_USERNAME}
    # 关于明文密码的问题，后期打包时再做处理，包括url也是需要在部署时动态调整。
    password: ${J2AGENT_DB_PASSWORD}
    druid:
      initial-size: 5
      minIdle: 5
      maxActive: 20
      # 配置获取连接等待超时的时间，单位是毫秒
      maxWait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      timeBetweenEvictionRunsMillis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      minEvictableIdleTimeMillis: 30000
      validationQuery: SELECT 1
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      #druid recycle
      removeAbandoned: true
      #单位:秒
      removeAbandonedTimeout: 2400
      logAbandoned: true
      # 打开PSCache，并且指定每个连接上PSCache的大小
      poolPreparedStatements: true
      maxPoolPreparedStatementPerConnectionSize: 20
      # 配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall'用于防火墙
      filters: stat,slf4j
      # 通过connectProperties属性来打开mergeSql功能；慢SQL记录
      connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
  flyway:
    enabled: true
    clean-disabled: true
    table: flyway_schema_history
    baseline-on-migrate: true
    encoding: UTF-8
    out-of-order: false
    validate-on-migrate: true
    # 指定 baseline 的版本号,默认值为 1, 小于等于该版本号的 SQL 文件, migrate 时会被忽略
    baseline-version: 0
    # sql 文件的位置
    # 文件名格式必须是 V{version}__{description}.sql、V{version}__{description}.java，version必须是整数
    locations: classpath:/sql/migration/postgresql/${I18N}
  http:
    codec:
      max-in-memory-size: 1MB
  data:
    redis:
      host: ${J2AGENT_REDIS_HOST}
      port: ${J2AGENT_REDIS_PORT}
mybatis:
  configLocation: classpath:mapper/mybatis-config.xml
  mapperLocations: classpath*:mapper/ai/base/**/*.xml
  file-path:
    export-file: /var/backup/ftp/virtual/exportfiles/logs
j2agent:
  storage:
    enabled: ${J2AGENT_STORAGE_ENABLED}
    type: ${J2AGENT_STORAGE_TYPE}
    bucket: ${J2AGENT_STORAGE_BUCKET}
    access-mode: ${J2AGENT_STORAGE_ACCESS_MODE:proxy}
    s3:
      endpoint: ${J2AGENT_S3_ENDPOINT:}
      access-key-id: ${J2AGENT_S3_ACCESS_KEY_ID:}
      secret-access-key: ${J2AGENT_S3_SECRET_ACCESS_KEY:}
    oss:
      endpoint: ${OSS_ENDPOINT:}
      access-key-id: ${OSS_ACCESS_KEY_ID:}
      access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    qiniu:
      access-key: ${QINIU_ACCESS_KEY:}
      secret-key: ${QINIU_SECRET_KEY:}
      domain: ${QINIU_DOMAIN:}
      use-https: ${QINIU_USE_HTTPS:true}
    sync:
      retention-days: ${J2AGENT_STORAGE_SYNC_RETENTION_DAYS:7}
      cleanup-cron: "${J2AGENT_STORAGE_SYNC_CLEANUP_CRON:0 30 2 * * *}"
  security:
    jwt:
      # secret / kmac-output-length-bytes 须与外部系统部署一致（通常与 com.nms.jwt 相同）
      algorithm: Kmac256
      secret: ${JWT_SECRET}
      kmac-output-length-bytes: 256
      expires-for-browser: 1800
      expires-for-mobile: 2592000
      expires-for-openapi: 7200
      expires-for-remember-me: 2592000
    captcha:
      expire-seconds: 300
      pow-difficulty: 4
  websocket:
    # websocket最大消息字节数BufferSize (2M)
    max_message_buffer_size: 2097152
  vector-database:
    provider: milvus
    milvus:
      cluster-endpoint: http://${J2AGENT_MILVUS_HOST}:${J2AGENT_MILVUS_PORT}
      token: ${J2AGENT_MILVUS_TOKEN}
      schema-config-path: ${J2AGENT_MILVUS_SCHEMA_CONFIG_PATH:}
  knowledge:
    repo:
      # 知识库仓库根目录
      root-path: /opt/j2agent/volume/knowledge-repo
      watch-enabled: true
      # 入库 content_segment 单段最大字符数
      content-segment-chars: 6000
      # 入库 content_segment 与超长 query 切分的相邻段重叠字符数（0 表示无重叠）
      content-segment-overlap-chars: 50
  chat-input:
    max-user-message-length: 32768
  active-chat-turn:
    heartbeat-ttl-seconds: 30
    heartbeat-touch-interval-seconds: 10
    sweeper-interval-seconds: 60
    key-fallback-ttl-hours: 24
  retrieve:
    max-embedding-input-chars: 8192
    max-query-chunks: 5
  # 智能体插件配置
  plugin:
    path: /opt/j2agent/volume/plugins
