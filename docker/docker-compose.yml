x-middleware-images:
  mysql: &mysql_image mysql:8.0.36
  redis: &redis_image redis:7.4.2
  etcd: &etcd_image quay.io/coreos/etcd:v3.5.25
  minio: &minio_image minio/minio:RELEASE.2024-12-18T13-15-44Z
  milvus: &milvus_image milvusdb/milvus:v2.6.18

services:
  mysql:
    image: *mysql_image
    platform: linux/amd64
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD} # 仅初始化生效
      MYSQL_DATABASE: ${MYSQL_DATABASE} # 仅初始化生效
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      # 1. 数据持久化：宿主机数据目录 -> 容器内 MySQL 默认 datadir
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}mysql${DIR_PATH_SEPARATOR}data:/var/lib/mysql
      # 2. 自定义配置：挂到 conf.d 让 MySQL 自动加载，避免覆盖镜像自带的 /etc/mysql/my.cnf
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}mysql${DIR_PATH_SEPARATOR}conf${DIR_PATH_SEPARATOR}my.cnf:/etc/mysql/conf.d/my.cnf:ro
      # 3. Socket 目录映射：宿主机可直接使用 ${MP_BASE_PATH}/mysql/run/mysqld.sock
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}mysql${DIR_PATH_SEPARATOR}run:/var/run/mysqld
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
  redis:
    image: *redis_image
    platform: linux/amd64
    command: [ "redis-server", "--appendonly", "yes", "--port", "6379" ]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}redis${DIR_PATH_SEPARATOR}data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "ping" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 10s
    restart: unless-stopped
  etcd:
    image: *etcd_image
    platform: linux/amd64
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - -advertise-client-urls=http://etcd:2379
      - -listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}etcd:/etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
  minio:
    image: *minio_image
    platform: linux/amd64
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    ports:
      # 如果 .env 未设置对应变量，给一个不常用的默认端口，避免宿主机 9000/9001 冲突
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}minio${DIR_PATH_SEPARATOR}data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
  milvus:
    image: *milvus_image
    platform: linux/amd64
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        mkdir -p /milvus/external_configs
        if [ -d /milvus/external_configs/user.yaml ]; then
          rm -rf /milvus/external_configs/user.yaml
        fi
        if [ ! -f /milvus/external_configs/user.yaml ]; then
          printf "%s\n" "# Extra config to override default milvus.yaml" > /milvus/external_configs/user.yaml
        fi
        cp /milvus/external_configs/user.yaml /milvus/configs/user.yaml
        exec milvus run standalone
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_USE_EMBED: "false"
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: "${MINIO_ROOT_USER}"
      MINIO_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD}"
      MINIO_BUCKET_NAME: milvus-bucket
      MQ_TYPE: woodpecker
    ports:
      - "${MILVUS_PORT}:19530"
      - "${MILVUS_HEALTH_PORT}:9091"
    volumes:
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}milvus${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}milvus:/var/lib/milvus
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}milvus:/milvus/external_configs
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    restart: unless-stopped
  j2agent:
    image: j2agent:${TAG}
    platform: linux/amd64
    pull_policy: build
    build:
      context: ..
      dockerfile: docker/j2agent/Dockerfile
    ports:
      - "${J2AGENT_PORT}:${J2AGENT_PORT}"
    environment:
      I18N: "${I18N}"
      JWT_SECRET: "${JWT_SECRET}"
      JAVA_OPTS: "${JAVA_OPTS}"
      SPRING_OPTIONS: "${SPRING_OPTIONS}"
      J2AGENT_PORT: "${J2AGENT_PORT}"
      J2AGENT_MYSQL_HOST: "${J2AGENT_MYSQL_HOST}"
      J2AGENT_MYSQL_PORT: "${J2AGENT_MYSQL_PORT}"
      J2AGENT_DB_USERNAME: "${J2AGENT_DB_USERNAME}"
      J2AGENT_DB_PASSWORD: "${J2AGENT_DB_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      J2AGENT_REDIS_HOST: "${J2AGENT_REDIS_HOST}"
      J2AGENT_REDIS_PORT: "${J2AGENT_REDIS_PORT}"
      J2AGENT_REDIS_PASSWORD: "${J2AGENT_REDIS_PASSWORD}"
      J2AGENT_MILVUS_HOST: "${J2AGENT_MILVUS_HOST}"
      J2AGENT_MILVUS_PORT: "${J2AGENT_MILVUS_PORT}"
      J2AGENT_MILVUS_TOKEN: "${J2AGENT_MILVUS_TOKEN}"
      J2AGENT_MILVUS_SCHEMA_CONFIG_PATH: "${J2AGENT_MILVUS_SCHEMA_CONFIG_PATH}"
      J2AGENT_STORAGE_ENABLED: "${J2AGENT_STORAGE_ENABLED}"
      J2AGENT_STORAGE_TYPE: "${J2AGENT_STORAGE_TYPE}"
      J2AGENT_STORAGE_BUCKET: "${J2AGENT_STORAGE_BUCKET}"
      J2AGENT_S3_ENDPOINT: "${J2AGENT_S3_ENDPOINT}"
      J2AGENT_S3_ACCESS_KEY_ID: "${J2AGENT_S3_ACCESS_KEY_ID}"
      J2AGENT_S3_SECRET_ACCESS_KEY: "${J2AGENT_S3_SECRET_ACCESS_KEY}"
      J2AGENT_CHAT_ATTACHMENT_DISPLAY: "${J2AGENT_CHAT_ATTACHMENT_DISPLAY:-proxy}"
      J2AGENT_STORAGE_SYNC_RETENTION_DAYS: "${J2AGENT_STORAGE_SYNC_RETENTION_DAYS}"
      J2AGENT_STORAGE_SYNC_CLEANUP_CRON: "${J2AGENT_STORAGE_SYNC_CLEANUP_CRON}"
      OSS_ENDPOINT: "${OSS_ENDPOINT}"
      OSS_ACCESS_KEY_ID: "${OSS_ACCESS_KEY_ID}"
      OSS_ACCESS_KEY_SECRET: "${OSS_ACCESS_KEY_SECRET}"
      QINIU_ACCESS_KEY: "${QINIU_ACCESS_KEY}"
      QINIU_SECRET_KEY: "${QINIU_SECRET_KEY}"
      QINIU_DOMAIN: "${QINIU_DOMAIN}"
      QINIU_USE_HTTPS: "${QINIU_USE_HTTPS}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}j2agent:/opt/j2agent/volume
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}j2agent${DIR_PATH_SEPARATOR}knowledge-repo:/opt/j2agent/volume/knowledge-repo
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}j2agent${DIR_PATH_SEPARATOR}plugins${DIR_PATH_SEPARATOR}agents:/opt/j2agent/volume/plugins/agents
      - ${J2AGENT_VOLUMES_PATH}${DIR_PATH_SEPARATOR}volumes${DIR_PATH_SEPARATOR}j2agent${DIR_PATH_SEPARATOR}plugins${DIR_PATH_SEPARATOR}skills:/opt/j2agent/volume/plugins/skills
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    restart: unless-stopped
networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.19.11.0/24
          gateway: 10.19.11.1
